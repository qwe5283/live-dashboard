# Quick start with pre-built image — no need to clone or build from source.
# 1. Copy this file:  cp docker-compose.example.yml docker-compose.yml
# 2. Create .env:     cp .env.example .env   (then fill in your tokens)
# 3. Run:             docker compose up -d

services:
  dashboard:
    image: ghcr.io/monika-dream/live-dashboard:latest
    container_name: live_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DB_PATH=/data/live-dashboard.db
      - DEVICE_TOKEN_1=${DEVICE_TOKEN_1}
      - DEVICE_TOKEN_2=${DEVICE_TOKEN_2}
      - HASH_SECRET=${HASH_SECRET}
    volumes:
      - dashboard_data:/data
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  dashboard_data:
