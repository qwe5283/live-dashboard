# Live Dashboard — Nginx reverse proxy example
# Replace YOUR_DOMAIN with your actual domain.
# Replace 172.20.0.80 with your container's IP or use Docker service name.
#
# PREREQUISITE: Add this line to the http {} block:
#   limit_req_zone $binary_remote_addr zone=dashboard_api:2m rate=10r/s;

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate /etc/nginx/ssl/your-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/your-key.key;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Rate limiting for report endpoint (agent uploads)
    location = /api/report {
        limit_req zone=dashboard_api burst=30 nodelay;
        proxy_pass http://172.20.0.80:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API and static files
    location / {
        proxy_pass http://172.20.0.80:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
